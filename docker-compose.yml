version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: jsherp-postgres
    environment:
      POSTGRES_DB: jsh_erp
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Postgres@123}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./jshERP-boot/docs/jsh_erp_pg.sql:/docker-entrypoint-initdb.d/init.sql
      - ./jshERP-boot/docs/jsh_erp_trade_pg.sql:/docker-entrypoint-initdb.d/99-trade.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: jsherp-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-1234abcd}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-1234abcd}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jsherp-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/jsh_erp
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-Postgres@123}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-1234abcd}
      AI_CONFIG_MASTER_KEY: ${AI_CONFIG_MASTER_KEY:-}
    ports:
      - "${APP_PORT:-9999}:9999"
    volumes:
      - upload_data:/opt/jshERP/upload
      - export_data:/opt/jshERP/export
      - plugin_data:/opt/jshERP/plugins
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./jshERP-web
      dockerfile: Dockerfile
    container_name: jsherp-web
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  upload_data:
  export_data:
  plugin_data:
